[opener]
litio = [
	{ run = 'litio "$@"', desc = "litio" },
]
Chemcraft = [
	{ run = 'wine /home/vport/.wine/drive_c/Chemcraft/Chemcraft.exe "$@"', desc = "Chemcraft" },
]
bibiman = [
	{run = 'bibiman "$@"', block = true, desc = "bibiman"}
]
edit = [
	{ run = '$EDITOR "$@"', block = true, for = "unix" },
]

[open]
prepend_rules = [
	{ name = "*.inp", use = ["edit", "Chemcraft"] },
	{ name = "*.xyz", use = ["litio", "edit", "Chemcraft"] },
	{ name = "*.out", use = ["Chemcraft", "edit"] },
	{ name = "*.bib", use = ["bibiman"]}
]

# Linux: Swaybg
[[opener.set-wallpaper]]
run  = "killall swaybg; swaybg -m fill -i %s1"
for  = "linux"
desc = "Set as wallpaper"
orphan = true


[[mgr.prepend_keymap]]
on  = "y"
run = [ 'shell -- for path in %s; do echo "file://$path"; done | wl-copy -t text/uri-list', "yank" ]
