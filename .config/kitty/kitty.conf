font_family      FiraCode Nerd Font Mono
font_size        14.0

shell            /usr/bin/fish

cursor_shape     beam
cursor_blink_interval 0

scrollback_lines 100000

window_padding_width 10

background_opacity 0.7

enable_audio_bell no
allow_remote_control yes
copy_on_select clipboard

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_background #181825
active_tab_foreground #11111b
active_tab_background #b4befe
inactive_tab_foreground #bac2de
inactive_tab_background #313244
inactive_tab_font_style normal
tab_title_template " {index}: {title} "

map alt+h remote_control_script /home/vport/.config/kitty/smart-focus.sh left
map alt+j remote_control_script /home/vport/.config/kitty/smart-focus.sh bottom
map alt+k remote_control_script /home/vport/.config/kitty/smart-focus.sh top
map alt+l remote_control_script /home/vport/.config/kitty/smart-focus.sh right
map alt+shift+h move_tab_backward
map alt+shift+l move_tab_forward
map ctrl+a>, set_tab_title
map ctrl+a>c new_tab_with_cwd !neighbor
map ctrl+a>r launch --location=hsplit
map ctrl+a>u launch --location=vsplit
map ctrl+a>x close_tab
map ctrl+a>z toggle_layout stack

foreground        #cdd6f4
background        #1e1e2e
selection_foreground #1e1e2e
selection_background #f5e0dc
cursor            #f5e0dc
cursor_text_color #1e1e2e

color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8
